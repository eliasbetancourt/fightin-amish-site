# Netlify configuration for The Fightin' Amish
# Build + security headers. No backend; static SPA with Netlify Forms.

[build]
  command = "npm run build"
  publish = "dist"

[[headers]]
  for = "/*"
  [headers.values]
    # Force HTTPS for 2 years, including subdomains, and submit for preload.
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    # Block MIME-type sniffing.
    X-Content-Type-Options = "nosniff"
    # Anti-clickjacking (legacy header; mirrored by CSP frame-ancestors below).
    X-Frame-Options = "DENY"
    # Limit referrer leakage to other origins.
    Referrer-Policy = "strict-origin-when-cross-origin"
    # Deny powerful browser features the site never uses.
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
    # CSP via HTTP header so frame-ancestors is enforced (it is ignored in a <meta> tag).
    Content-Security-Policy = "default-src 'self'; script-src 'self'; style-src 'self' fonts.googleapis.com; font-src fonts.gstatic.com; connect-src 'self'; img-src 'self' data:; frame-src 'none'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; upgrade-insecure-requests"
