<!doctype html>
<html lang="en">

<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-HV9SS9X2N8"></script>
  <script src="/gtag-init.js"></script>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Security: Content Security Policy -->
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self' https://www.googletagmanager.com; style-src 'self' fonts.googleapis.com; font-src fonts.gstatic.com; connect-src 'self' https://www.google-analytics.com https://*.google-analytics.com https://*.analytics.google.com https://www.googletagmanager.com; img-src 'self' data: https://www.google-analytics.com https://*.google-analytics.com https://www.googletagmanager.com; frame-src 'none'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; upgrade-insecure-requests" />

  <!-- SEO -->
  <meta name="robots" content="index, follow" />
  <meta name="description"
    content="Lancaster County soccer team competing for $1 million at The Soccer Tournament 2027. Join us as a sponsor." />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@400;700;800&display=swap"
    rel="stylesheet">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

  <!-- OG / Social sharing -->
  <meta property="og:title" content="The Fightin' Amish — TST 2027" />
  <meta property="og:description"
    content="Lancaster County's team chasing the $1M prize at The Soccer Tournament 2027. Become a sponsor." />
  <meta property="og:image" content="https://thefightinamish.com/og-image.png" />
  <meta property="og:url" content="https://thefightinamish.com/" />
  <meta property="og:type" content="website" />

  <!-- Twitter card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="The Fightin' Amish — TST 2027" />
  <meta name="twitter:description"
    content="Lancaster County's team chasing the $1M prize at The Soccer Tournament 2027." />
  <meta name="twitter:image" content="https://thefightinamish.com/og-image.png" />

  <title>The Fightin' Amish | TST 2027</title>
</head>

<body>
  <!-- Hidden static form: lets Netlify detect the form at build time (the real
       form is rendered by React and submitted via fetch). Never shown to users. -->
  <form name="sponsor-inquiry" netlify netlify-honeypot="bot-field" hidden>
    <input type="text" name="name" />
    <input type="email" name="email" />
    <input type="text" name="company" />
    <select name="tier"></select>
    <textarea name="message"></textarea>
    <input type="text" name="bot-field" />
  </form>

  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
